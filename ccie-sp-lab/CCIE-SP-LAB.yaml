          - curl http://jtac-iosxr-1.cisco.com/nso/packages/CCIE-NSO-l3vpn/CCIE-NSO-l3vpn.yang -o /home/ubuntu/ncs-run/packages/CCIE-NSO-l3vpn/src/yang/CCIE-NSO-l3vpn.yang
          - curl http://jtac-iosxr-1.cisco.com/nso/packages/CCIE-NSO-l3vpn/CCIE-NSO-l3vpn-template.xml -o /home/ubuntu/ncs-run/packages/CCIE-NSO-l3vpn/templates/CCIE-NSO-l3vpn-template.xml

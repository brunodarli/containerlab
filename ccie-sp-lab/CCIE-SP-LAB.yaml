          - bash -c 'export HOME=/root/; source /home/ubuntu/ncs-6.1/ncsrc; cd /home/ubuntu/ncs-run/packages/CCIE-NSO-l3vpn/src/; make; cd -;'
          - echo 'export PATH=/home/ubuntu/xrd/scripts:/home/ubuntu/bin:$PATH' >> /home/ubuntu/.profile
          - echo "alias ssh-quiet='ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'" >> /home/ubuntu/.bash_aliases

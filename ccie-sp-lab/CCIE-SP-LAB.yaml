          - sh /root/nso-6.1.16.linux.x86_64.installer.bin /home/ubuntu/ncs-6.1
          - echo 'source ~/ncs-6.1/ncsrc' >> /home/ubuntu/.profile
          - bash -c 'source /home/ubuntu/ncs-6.1/ncsrc; ncs-setup --dest /home/ubuntu/ncs-run;'
          - curl http://jtac-iosxr-1.cisco.com/nso/ncs-6.1.16-cisco-iosxr-7.67.signed.bin -o /root/ncs-6.1.16-cisco-iosxr-7.67.signed.bin
          - cd /root; sh ncs-6.1.16-cisco-iosxr-7.67.signed.bin; cd -;
          - cp /root/ncs-6.1.16-cisco-iosxr-7.67.tar.gz /home/ubuntu/ncs-run/packages/

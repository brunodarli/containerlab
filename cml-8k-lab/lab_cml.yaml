  - boot_disk_size: null
    configuration:
      - name: user-data
        content: |-
          #cloud-config
          password: cisco
          chpasswd: { expire: False }
          hostname: xrd
          ssh_pwauth: True
          ssh_authorized_keys:
             - your-ssh-pubkey-line-goes-here

          runcmd:
          #- sudo sed -i -re 's/([a-z]{2}\.)?archive.ubuntu.com|security.ubuntu.com/old-releases.ubuntu.com/g' /etc/apt/sources.list
          - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | apt-key add -
          - add-apt-repository "deb [arch=$(dpkg --print-architecture)] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable"
          - echo "deb [trusted=yes] https://apt.fury.io/netdevops/ /" | tee -a /etc/apt/sources.list.d/netdevops.list
          - apt-get update -y
          - apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose
          - apt-get install -y containerlab bridge-utils
          - mkdir -p /etc/systemd/system/docker.service.d/
          - echo '[Service]' > /etc/systemd/system/docker.service.d/http-proxy.conf
          - echo 'Environment="HTTP_PROXY=http://proxy.esl.cisco.com:80/" "HTTPS_PROXY=http://proxy.esl.cisco.com:80/" "NO_PROXY=.cisco.com"' >> /etc/systemd/system/docker.service.d/http-proxy.conf
          - systemctl daemon-reload
          - systemctl start docker
          - systemctl enable docker
          - systemctl restart docker
          - usermod -a -G docker ubuntu
          - containerlab completion bash > /etc/bash_completion.d/containerlab
          - echo 'fs.inotify.max_user_instances=64000' >> /etc/sysctl.conf
          - echo 'fs.inotify.max_user_watches=64000' >> /etc/sysctl.conf
          - echo 'net.bridge.bridge-nf-call-iptables=0' >> /etc/sysctl.conf
          - echo 'net.bridge.bridge-nf-call-ip6tables=0' >> /etc/sysctl.conf
          - echo 'net.core.netdev_max_backlog=300000' >> /etc/sysctl.conf
          - echo 'net.core.optmem_max=67108864' >> /etc/sysctl.conf
          - echo 'net.core.rmem_default=67108864' >> /etc/sysctl.conf
          - echo 'net.core.rmem_max=67108864' >> /etc/sysctl.conf
          - echo 'net.core.wmem_default=67108864' >> /etc/sysctl.conf
          - echo 'net.core.wmem_max=67108864' >> /etc/sysctl.conf
          - echo 'net.ipv4.udp_mem=1124736 10000000 67108864' >> /etc/sysctl.conf
          - sysctl -p
          - apt-get install -y tftpd-hpa chrony
          - chmod go+w /srv/tftp/
          - sed -i "s/--secure/--secure --create/" /etc/default/tftpd-hpa
          - systemctl restart tftpd-hpa.service
          - sed -i "/# See http:\/\/www\.pool\.ntp\.org\/join\.html for more information\./a\server 172.18.108.14 iburst\nserver 172.18.108.15 iburst" /etc/chrony/chrony.conf
          - sed -i "/^pool .*/s/^/#/" /etc/chrony/chrony.conf
          - echo "\n# NTP access list\nallow 172.31.0.0/24" >> /etc/chrony/chrony.conf
          - systemctl restart chrony
